<!DOCTYPE html>
<html>
<head>
    <title>Recipe Search</title>
</head>
<body>
    <h1>Search for a Recipe</h1>
    <form method="get" action="">
        {{ form.as_p }}
        <button type="submit">Search</button>
    </form>
    <hr>
    {% if recipes %}
        <h2>Results</h2>
        <ul>
        {% for recipe in recipes %}
            <li>{{ recipe.title }}</li>
        {% empty %}
            <li>No recipes found.</li>
        {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
